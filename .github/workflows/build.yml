name: Build HideMT APK
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 生成Gradle Wrapper脚本
        run: |
          echo '#!/bin/sh' > gradlew
          echo 'cd "$(dirname "$0")"' >> gradlew
          echo 'exec java -Xmx64m -Xms64m -classpath "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: 缓存依赖，加速打包
        uses: gradle/actions/setup-gradle@v4

      - name: 编译Release正式版APK
        run: ./gradlew clean assembleRelease --stacktrace

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: 成品_HideMT_APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
